<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HEFYR — The Industrial Forge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=Montserrat:wght@100;200;300&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#F0EBE0}
#cv{position:fixed;top:0;left:0;width:100%;height:100%}
.vig{position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 30%,rgba(200,192,178,.42) 100%);pointer-events:none;z-index:1}
.ctr{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;z-index:2;pointer-events:none}
.lm{width:96px;height:110px;margin-bottom:30px;opacity:0;animation:rise 2.2s cubic-bezier(.16,1,.3,1) forwards .15s}
.wm{font-family:'Montserrat',-apple-system,sans-serif;font-weight:200;font-size:clamp(46px,7vw,74px);letter-spacing:.38em;text-indent:.38em;color:#1A1511;line-height:1;opacity:0;animation:rise 2.2s cubic-bezier(.16,1,.3,1) forwards .45s}
.sub{font-family:'Montserrat',-apple-system,sans-serif;font-weight:300;font-size:clamp(7.5px,1.05vw,11px);letter-spacing:.52em;text-indent:.52em;color:#9A8B7C;margin-top:9px;opacity:0;animation:rise 2.2s cubic-bezier(.16,1,.3,1) forwards .65s}
.rl{width:34px;height:1px;background:#B85530;margin:34px auto;opacity:0;transform-origin:center;animation:xpand 1.6s ease forwards 1.15s}
.vis{font-family:'Cormorant Garamond',Georgia,serif;font-style:italic;font-weight:300;font-size:clamp(13.5px,1.75vw,18.5px);color:#5A4C40;text-align:center;line-height:1.95;max-width:470px;padding:0 22px;opacity:0;animation:rise 2.2s cubic-bezier(.16,1,.3,1) forwards .95s}
.vis em{font-style:normal;color:#B85530;font-weight:400}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes xpand{from{opacity:0;transform:scaleX(0)}to{opacity:.65;transform:scaleX(1)}}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div class="vig"></div>
<div class="ctr">
  <svg class="lm" viewBox="0 0 200 225" fill="none" xmlns="http://www.w3.org/2000/svg">
    <polygon points="100,6 183,52 183,144 100,190 17,144 17,52" stroke="#C4BAB0" stroke-width="1.2" fill="none"/>
    <polygon points="66,152 91,74 115,152" fill="#D4BC8A" opacity=".82"/>
    <polygon points="87,152 117,78 142,152" fill="#C9A86A" opacity=".82"/>
    <polygon points="77,152 100,50 123,152" fill="#B85530" opacity=".97"/>
    <circle cx="109" cy="38" r="2.5" fill="#C9A86A" opacity=".72"/>
    <circle cx="117" cy="30" r="1.7" fill="#B85530" opacity=".62"/>
  </svg>
  <div class="wm">HEFYR</div>
  <div class="sub">THE INDUSTRIAL FORGE</div>
  <div class="rl"></div>
  <div class="vis">The god who forged the weapons of Olympus.<br>We forge the <em>intelligence of industry</em>.</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const cv=document.getElementById('cv');
const W=()=>window.innerWidth, H=()=>window.innerHeight;
const scene=new THREE.Scene();
scene.background=new THREE.Color(0xF0EBE0);
const cam=new THREE.PerspectiveCamera(60,W()/H(),.1,300);
cam.position.set(0,0,9);
const renderer=new THREE.WebGLRenderer({canvas:cv,antialias:true});
renderer.setSize(W(),H());
renderer.setPixelRatio(Math.min(devicePixelRatio,2));

const PAL=[
  new THREE.Color(0xB85530),
  new THREE.Color(0xC9A86A),
  new THREE.Color(0xD4BC8A),
  new THREE.Color(0x9A4225),
  new THREE.Color(0xDDCAA5),
];

// Forge sparks
const N=3000;
const pp=new Float32Array(N*3),pc=new Float32Array(N*3),pv=new Float32Array(N),ph=new Float32Array(N);
const SX=24,SY=17,SZ=15;
for(let i=0;i<N;i++){
  pp[i*3]=(Math.random()-.5)*SX;
  pp[i*3+1]=(Math.random()-.5)*SY;
  pp[i*3+2]=(Math.random()-.5)*SZ;
  pv[i]=.007+Math.random()*.022;
  ph[i]=Math.random()*Math.PI*2;
  const c=PAL[Math.floor(Math.random()*PAL.length)];
  pc[i*3]=c.r;pc[i*3+1]=c.g;pc[i*3+2]=c.b;
}
const pgeo=new THREE.BufferGeometry();
pgeo.setAttribute('position',new THREE.BufferAttribute(pp,3));
pgeo.setAttribute('color',new THREE.BufferAttribute(pc,3));
scene.add(new THREE.Points(pgeo,new THREE.PointsMaterial({size:.048,vertexColors:true,transparent:true,opacity:.55,sizeAttenuation:true})));

// Icosahedra wireframes
const mkIco=(r,op,col)=>{
  const m=new THREE.Mesh(new THREE.IcosahedronGeometry(r,1),new THREE.MeshBasicMaterial({color:col,wireframe:true,transparent:true,opacity:op}));
  scene.add(m);return m;
};
const i1=mkIco(2.1,.10,0xB85530);
const i2=mkIco(3.5,.05,0xC9A86A);
const i3=mkIco(5.0,.025,0xD4BC8A);

// Ring of hex lines (custom hexagon wireframe in 3D)
const hexRing=(r,y,col,op)=>{
  const pts=[];
  for(let k=0;k<=6;k++) pts.push(new THREE.Vector3(r*Math.cos(k*Math.PI/3),y,r*Math.sin(k*Math.PI/3)));
  const g=new THREE.BufferGeometry().setFromPoints(pts);
  const l=new THREE.Line(g,new THREE.LineBasicMaterial({color:col,transparent:true,opacity:op}));
  scene.add(l);return l;
};
const hr1=hexRing(2.8,0,0xB85530,.14);
const hr2=hexRing(4.0,.6,0xC9A86A,.09);
const hr3=hexRing(4.0,-.6,0xC9A86A,.09);

// Floaters
const floaters=[];
const fgArr=[new THREE.OctahedronGeometry(.21,0),new THREE.TetrahedronGeometry(.19,0),new THREE.IcosahedronGeometry(.16,0)];
const fcArr=[0xB85530,0xC9A86A,0x9A4225,0xD4BC8A];
for(let i=0;i<30;i++){
  const mesh=new THREE.Mesh(fgArr[i%3],new THREE.MeshBasicMaterial({color:fcArr[i%4],wireframe:true,transparent:true,opacity:.2+Math.random()*.28}));
  const r=4.4+Math.random()*4.8;
  const th=(i/30)*Math.PI*2+Math.random()*.35;
  mesh.position.set(r*Math.cos(th),(Math.random()-.5)*6,r*Math.sin(th));
  floaters.push({mesh,r,th,yOff:mesh.position.y,
    os:(6e-4+Math.random()*1e-3)*(Math.random()<.5?1:-1),
    rx:(Math.random()-.5)*.014,ry:(Math.random()-.5)*.014,rz:(Math.random()-.5)*.008});
  scene.add(mesh);
}

// Anim
let t=0;
(function tick(){
  requestAnimationFrame(tick);
  t+=.005;
  // Sparks rise
  const pa=pgeo.attributes.position.array;
  for(let i=0;i<N;i++){
    pa[i*3+1]+=pv[i];
    pa[i*3]+=Math.sin(t*1.1+ph[i])*.003;
    if(pa[i*3+1]>SY/2){pa[i*3+1]=-SY/2;pa[i*3]=(Math.random()-.5)*SX;pa[i*3+2]=(Math.random()-.5)*SZ;}
  }
  pgeo.attributes.position.needsUpdate=true;
  // Icosahedra
  i1.rotation.y=t*.055;i1.rotation.x=t*.027;
  i2.rotation.y=-t*.038;i2.rotation.z=t*.017;
  i3.rotation.x=t*.021;i3.rotation.y=-t*.014;
  // Hex rings slowly tilt
  hr1.rotation.y=t*.025;
  hr2.rotation.y=-t*.018;hr2.rotation.x=t*.012;
  hr3.rotation.y=t*.018;hr3.rotation.x=-t*.012;
  // Floaters
  floaters.forEach(f=>{
    f.th+=f.os;
    f.mesh.position.x=f.r*Math.cos(f.th);
    f.mesh.position.z=f.r*Math.sin(f.th);
    f.mesh.rotation.x+=f.rx;f.mesh.rotation.y+=f.ry;f.mesh.rotation.z+=f.rz;
  });
  // Camera breathe
  cam.position.x=Math.sin(t*.06)*.55;
  cam.position.y=Math.cos(t*.048)*.34;
  cam.lookAt(0,0,0);
  renderer.render(scene,cam);
})();

window.addEventListener('resize',()=>{cam.aspect=W()/H();cam.updateProjectionMatrix();renderer.setSize(W(),H());});
</script>
</body>
</html>
